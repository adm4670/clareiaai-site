<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c8ee5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0c8ee5"/>
    </linearGradient>
    <filter id="fs1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0c8ee5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" rx="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Header label -->
  <rect x="220" y="20" width="160" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="300" y="39" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#0c8ee5">Plataforma Completa</text>

  <!-- Central hub -->
  <circle cx="300" cy="200" r="70" fill="white" filter="url(#fs1)" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="300" cy="200" r="50" fill="url(#fg)" opacity="0.06"/>
  <circle cx="300" cy="200" r="30" fill="url(#fg)" opacity="0.12"/>

  <!-- Central icon - brain/AI -->
  <g transform="translate(300, 200)">
    <path d="M-12-8 Q-18-15 -12-20 Q-6-25 0-20 Q6-25 12-20 Q18-15 12-8 Q18-2 12 4 Q18 10 12 16 Q6 20 0 16 Q-6 20 -12 16 Q-18 10 -12 4 Q-18-2 -12-8 Z" fill="url(#fg)" opacity="0.3"/>
    <circle cx="0" cy="-6" r="3" fill="#0c8ee5" opacity="0.6"/>
    <circle cx="-6" cy="2" r="2.5" fill="#7c3aed" opacity="0.6"/>
    <circle cx="6" cy="2" r="2.5" fill="#06b6d4" opacity="0.6"/>
    <line x1="0" y1="-6" x2="-6" y2="2" stroke="#0c8ee5" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-6" x2="6" y2="2" stroke="#0c8ee5" stroke-width="1" opacity="0.3"/>
    <line x1="-6" y1="2" x2="6" y2="2" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Module cards around -->
  <!-- Module 1: Diagnóstico - top left -->
  <g transform="translate(50, 80)" filter="url(#fs1)">
    <rect x="0" y="0" width="130" height="50" rx="12" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="14" fill="#eff6ff"/>
    <text x="25" y="29" text-anchor="middle" font-family="Inter" font-weight="700" font-size="12" fill="#0c8ee5">01</text>
    <text x="50" y="22" font-family="Inter" font-weight="600" font-size="11" fill="#374151">Diagnóstico</text>
    <text x="50" y="36" font-family="Inter" font-size="9" fill="#6b7280">Mapeamento completo</text>
  </g>

  <!-- Module 2: Roadmap - top right -->
  <g transform="translate(420, 80)" filter="url(#fs1)">
    <rect x="0" y="0" width="130" height="50" rx="12" fill="white" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="14" fill="#faf5ff"/>
    <text x="25" y="29" text-anchor="middle" font-family="Inter" font-weight="700" font-size="12" fill="#7c3aed">02</text>
    <text x="50" y="22" font-family="Inter" font-weight="600" font-size="11" fill="#374151">Roadmap</text>
    <text x="50" y="36" font-family="Inter" font-size="9" fill="#6b7280">Personalizado</text>
  </g>

  <!-- Module 3: Dashboard - bottom left -->
  <g transform="translate(50, 270)" filter="url(#fs1)">
    <rect x="0" y="0" width="130" height="50" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="14" fill="#f0fdf4"/>
    <text x="25" y="29" text-anchor="middle" font-family="Inter" font-weight="700" font-size="12" fill="#16a34a">03</text>
    <text x="50" y="22" font-family="Inter" font-weight="600" font-size="11" fill="#374151">Dashboard</text>
    <text x="50" y="36" font-family="Inter" font-size="9" fill="#6b7280">Evolução em tempo real</text>
  </g>

  <!-- Module 4: Simulados - bottom right -->
  <g transform="translate(420, 270)" filter="url(#fs1)">
    <rect x="0" y="0" width="130" height="50" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="14" fill="#fffbeb"/>
    <text x="25" y="29" text-anchor="middle" font-family="Inter" font-weight="700" font-size="12" fill="#d97706">04</text>
    <text x="50" y="22" font-family="Inter" font-weight="600" font-size="11" fill="#374151">Simulados</text>
    <text x="50" y="36" font-family="Inter" font-size="9" fill="#6b7280">Inteligentes</text>
  </g>

  <!-- Connection lines -->
  <g opacity="0.2">
    <!-- Center to 1 -->
    <path d="M250 180 L180 130" stroke="#0c8ee5" stroke-width="2" stroke-dasharray="5,4"/>
    <!-- Center to 2 -->
    <path d="M350 180 L420 130" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,4"/>
    <!-- Center to 3 -->
    <path d="M250 220 L180 270" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,4"/>
    <!-- Center to 4 -->
    <path d="M350 220 L420 270" stroke="#d97706" stroke-width="2" stroke-dasharray="5,4"/>
  </g>

  <!-- Extra small modules -->
  <g transform="translate(200, 40)" filter="url(#fs1)">
    <rect x="0" y="0" width="80" height="28" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Inter" font-weight="500" font-size="9" fill="#dc2626">Assistente IA</text>
  </g>
  <g transform="translate(320, 332)" filter="url(#fs1)">
    <rect x="0" y="0" width="85" height="28" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1"/>
    <text x="42.5" y="19" text-anchor="middle" font-family="Inter" font-weight="500" font-size="9" fill="#7c3aed">Competências</text>
  </g>

  <!-- Animated dots -->
  <circle cx="215" cy="155" r="3" fill="#0c8ee5" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="385" cy="155" r="3" fill="#7c3aed" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="215" cy="245" r="3" fill="#16a34a" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="385" cy="245" r="3" fill="#d97706" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom decorative line -->
  <path d="M80 380 L160 370 L240 375 L320 365 L400 372 L480 368 L540 375" stroke="url(#fg)" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>
