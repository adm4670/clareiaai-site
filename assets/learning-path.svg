<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" fill="none">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c8ee5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="ls1">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0c8ee5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="240" rx="20" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#ls1)"/>

  <!-- Progress bar background -->
  <rect x="60" y="115" width="600" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="60" y="115" width="580" height="4" rx="2" fill="url(#lg)" opacity="0.3"/>

  <!-- Step 1: Diagnóstico -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="120" height="140" rx="16" fill="white" stroke="#bfdbfe" stroke-width="2" filter="url(#ls1)"/>
    <circle cx="60" cy="40" r="22" fill="#eff6ff"/>
    <text x="60" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="16" fill="#0c8ee5">1</text>
    <text x="60" y="80" text-anchor="middle" font-family="Inter" font-weight="600" font-size="13" fill="#374151">Diagnóstico</text>
    <text x="60" y="98" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">IA analisa seu</text>
    <text x="60" y="112" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">nível atual</text>
    <!-- Step dot -->
    <circle cx="60" cy="130" r="6" fill="#0c8ee5" stroke="white" stroke-width="2"/>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(170, 105)">
    <line x1="0" y1="12" x2="55" y2="12" stroke="#0c8ee5" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <polygon points="55,8 65,12 55,16" fill="#0c8ee5" opacity="0.6"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Step 2: Roadmap -->
  <g transform="translate(235, 40)">
    <rect x="0" y="0" width="120" height="140" rx="16" fill="white" stroke="#e9d5ff" stroke-width="2" filter="url(#ls1)"/>
    <circle cx="60" cy="40" r="22" fill="#faf5ff"/>
    <text x="60" y="46" text-anchor="middle" font-family="Inter" font-weight="800" font-size="16" fill="#7c3aed">2</text>
    <text x="60" y="80" text-anchor="middle" font-family="Inter" font-weight="600" font-size="13" fill="#374151">Roadmap</text>
    <text x="60" y="98" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">Plano de estudos</text>
    <text x="60" y="112" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">personalizado</text>
    <circle cx="60" cy="130" r="6" fill="#7c3aed" stroke="white" stroke-width="2"/>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(355, 105)">
    <line x1="0" y1="12" x2="55" y2="12" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <polygon points="55,8 65,12 55,16" fill="#7c3aed" opacity="0.6"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <!-- Step 3: Evolua -->
  <g transform="translate(420, 40)">
    <rect x="0" y="0" width="120" height="140" rx="16" fill="white" stroke="#bbf7d0" stroke-width="2" filter="url(#ls1)"/>
    <circle cx="60" cy="40" r="22" fill="#f0fdf4"/>
    <text x="60" y="46" text-anchor="middle" font-family="Inter" font-weight="800" font-size="16" fill="#16a34a">3</text>
    <text x="60" y="80" text-anchor="middle" font-family="Inter" font-weight="600" font-size="13" fill="#374151">Evolua</text>
    <text x="60" y="98" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">Acompanhe seu</text>
    <text x="60" y="112" text-anchor="middle" font-family="Inter" font-size="9" fill="#6b7280">progresso</text>
    <circle cx="60" cy="130" r="6" fill="#16a34a" stroke="white" stroke-width="2"/>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(540, 105)">
    <line x1="0" y1="12" x2="50" y2="12" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <polygon points="50,8 60,12 50,16" fill="#16a34a" opacity="0.6"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Step 4: Aprovação -->
  <g transform="translate(600, 40)">
    <rect x="0" y="0" width="60" height="140" rx="16" fill="url(#lg)" opacity="0.08" stroke="url(#lg)" stroke-width="2"/>
    <text x="30" y="60" text-anchor="middle" font-size="28" fill="url(#lg)">🎯</text>
    <text x="30" y="95" text-anchor="middle" font-family="Inter" font-weight="700" font-size="11" fill="#374151">Apro</text>
    <text x="30" y="110" text-anchor="middle" font-family="Inter" font-weight="700" font-size="11" fill="#374151">vação</text>
    <circle cx="30" cy="130" r="6" fill="url(#lg)" stroke="white" stroke-width="2"/>
  </g>

  <!-- Decorative path at bottom -->
  <path d="M40 200 L100 195 L160 200 L220 190 L280 195 L340 185 L400 190 L460 182 L520 188 L580 180 L640 185" stroke="url(#lg)" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>
