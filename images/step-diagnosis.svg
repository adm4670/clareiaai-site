<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="90" fill="#0083ba" opacity="0.04"/>
  <circle cx="100" cy="100" r="6" fill="#0083ba" opacity="0.15"/>
  <!-- Pulse ring -->
  <circle cx="100" cy="100" r="30" stroke="#0083ba" stroke-width="1.5" fill="none" opacity="0.15">
    <animate attributeName="r" values="30;50;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="20" stroke="#0083ba" stroke-width="1" fill="none" opacity="0.1"/>
  <!-- Clipboard -->
  <rect x="80" y="75" width="40" height="50" rx="4" fill="white" stroke="#0083ba" stroke-width="2"/>
  <rect x="92" y="70" width="16" height="8" rx="2" fill="#0083ba"/>
  <line x1="88" y1="90" x2="112" y2="90" stroke="#0083ba" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="88" y1="98" x2="112" y2="98" stroke="#0083ba" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="88" y1="106" x2="105" y2="106" stroke="#0083ba" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Checkmark -->
  <path d="M90 115L95 120L108 108" stroke="#0083ba" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>