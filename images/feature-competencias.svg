<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba"/>
      <stop offset="100%" stop-color="#00699b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0083ba" opacity="0.06"/>
  <circle cx="50" cy="50" r="35" fill="#0083ba" opacity="0.03"/>

  <!-- Skill bars (left side) -->
  <g transform="translate(18, 28)">
    <rect x="0" y="0" width="32" height="6" rx="3" fill="#0083ba" opacity="0.12"/>
    <rect x="0" y="0" width="24" height="6" rx="3" fill="#0083ba" opacity="0.5"/>
    <rect x="0" y="12" width="32" height="6" rx="3" fill="#0083ba" opacity="0.12"/>
    <rect x="0" y="12" width="28" height="6" rx="3" fill="#d9007e" opacity="0.5"/>
    <rect x="0" y="24" width="32" height="6" rx="3" fill="#0083ba" opacity="0.12"/>
    <rect x="0" y="24" width="30" height="6" rx="3" fill="#fe4e19" opacity="0.5"/>
    <rect x="0" y="36" width="32" height="6" rx="3" fill="#0083ba" opacity="0.12"/>
    <rect x="0" y="36" width="18" height="6" rx="3" fill="#0083ba" opacity="0.5"/>
  </g>

  <!-- Magnifying glass (right side) -->
  <g transform="translate(50, 25)">
    <circle cx="18" cy="18" r="14" stroke="#0083ba" stroke-width="2.5" fill="none" opacity="0.7"/>
    <line x1="28" y1="28" x2="38" y2="38" stroke="#0083ba" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Target center in glass -->
  <circle cx="68" cy="43" r="5" stroke="#d9007e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="68" cy="43" r="2" fill="#d9007e" opacity="0.6"/>

  <!-- Crosshair lines in glass -->
  <line x1="68" y1="30" x2="68" y2="36" stroke="#d9007e" stroke-width="1" opacity="0.3"/>
  <line x1="68" y1="50" x2="68" y2="56" stroke="#d9007e" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="43" x2="61" y2="43" stroke="#d9007e" stroke-width="1" opacity="0.3"/>
  <line x1="75" y1="43" x2="81" y2="43" stroke="#d9007e" stroke-width="1" opacity="0.3"/>

  <!-- Data points inside glass -->
  <circle cx="62" cy="38" r="1.5" fill="#fe4e19" opacity="0.5"/>
  <circle cx="74" cy="48" r="1.5" fill="#fe4e19" opacity="0.5"/>
  <circle cx="64" cy="48" r="1" fill="#0083ba" opacity="0.4"/>

  <!-- Small dots connection -->
  <line x1="62" y1="38" x2="68" y2="43" stroke="#fe4e19" stroke-width="0.8" opacity="0.2"/>
  <line x1="74" y1="48" x2="68" y2="43" stroke="#fe4e19" stroke-width="0.8" opacity="0.2"/>
</svg>