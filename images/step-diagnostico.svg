<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="sd1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#faf0f5"/>
    </linearGradient>
  </defs>
  <rect width="200" height="180" rx="16" fill="url(#sd1)"/>
  <!-- Background origami -->
  <polygon points="0,0 80,0 0,80" fill="rgba(239,0,112,0.04)"/>
  <polygon points="200,180 120,180 200,100" fill="rgba(0,181,216,0.04)"/>
  <!-- Compass/diagnosis origami -->
  <polygon points="100,30 130,65 100,85 70,65" fill="rgba(0,72,145,0.08)" stroke="#004891" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="100,30 100,85 70,65" fill="rgba(239,0,112,0.06)" stroke="#ef0070" stroke-width="0.8" stroke-linejoin="round"/>
  <polygon points="100,30 130,65 100,85" fill="rgba(0,181,216,0.06)" stroke="#00b5d8" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Needle -->
  <polygon points="100,55 105,75 100,80 95,75" fill="#ef0070" opacity="0.4"/>
  <!-- Check mark -->
  <polygon points="40,90 52,80 64,92 52,84" fill="#00b5d8" opacity="0.2" stroke="#00b5d8" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="100" y="135" text-anchor="middle" fill="#004891" font-size="13" font-family="sans-serif" font-weight="bold">Diagnóstico</text>
  <text x="100" y="152" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">Avaliação inicial</text>
</svg>
