<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004891;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#003366;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001a33;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="magentaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef0070;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ef0070;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b5d8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00b5d8;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" rx="20" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="600" y2="50" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="600" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="600" y2="150" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="600" y2="250" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="600" y2="350" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="600" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Glow spheres -->
  <circle cx="100" cy="100" r="80" fill="url(#magentaGlow)"/>
  <circle cx="500" cy="400" r="100" fill="url(#cyanGlow)"/>

  <!-- Central brain/circuit icon -->
  <g transform="translate(300, 220)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ef0070" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ef0070" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00b5d8" stroke-width="1" opacity="0.4"/>

    <!-- Central brain shape -->
    <ellipse cx="0" cy="-5" rx="40" ry="35" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <path d="M-20,-30 Q-35,-15 -30,5 Q-25,20 -15,25" fill="none" stroke="#ef0070" stroke-width="2.5" opacity="0.8"/>
    <path d="M20,-30 Q35,-15 30,5 Q25,20 15,25" fill="none" stroke="#00b5d8" stroke-width="2.5" opacity="0.8"/>
    <path d="M-10,-32 Q0,-40 10,-32" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    <path d="M-5,5 Q0,-5 5,5" fill="none" stroke="#ef0070" stroke-width="2" opacity="0.7"/>

    <!-- Neural connections -->
    <g opacity="0.6">
      <circle cx="-30" cy="-50" r="4" fill="#ef0070"/>
      <circle cx="30" cy="-50" r="4" fill="#00b5d8"/>
      <circle cx="-45" cy="20" r="4" fill="#ef0070"/>
      <circle cx="45" cy="20" r="4" fill="#00b5d8"/>
      <circle cx="-20" cy="45" r="4" fill="white"/>
      <circle cx="20" cy="45" r="4" fill="white"/>
      <circle cx="0" cy="-55" r="3" fill="white"/>
    </g>

    <!-- Connecting lines (circuit-like) -->
    <line x1="-30" y1="-50" x2="-10" y2="-32" stroke="#ef0070" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="-50" x2="10" y2="-32" stroke="#00b5d8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-45" y1="20" x2="-15" y2="25" stroke="#ef0070" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="20" x2="15" y2="25" stroke="#00b5d8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="45" x2="-5" y2="5" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="45" x2="5" y2="5" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Floating elements -->
  <g opacity="0.15">
    <rect x="80" y="380" width="30" height="30" rx="6" fill="#ef0070" transform="rotate(15, 95, 395)"/>
    <rect x="490" y="80" width="20" height="20" rx="4" fill="#00b5d8" transform="rotate(30, 500, 90)"/>
    <circle cx="130" cy="420" r="8" fill="white"/>
    <circle cx="470" cy="120" r="6" fill="#ef0070"/>
  </g>

  <!-- Dots -->
  <g fill="white" opacity="0.08">
    <circle cx="200" cy="80" r="2"/>
    <circle cx="400" cy="60" r="2"/>
    <circle cx="150" cy="180" r="2"/>
    <circle cx="450" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/>
    <circle cx="500" cy="300" r="2"/>
    <circle cx="350" cy="430" r="2"/>
    <circle cx="250" cy="450" r="2"/>
  </g>

  <!-- Book/study icon at bottom -->
  <g transform="translate(300, 410)" opacity="0.5">
    <rect x="-20" y="-12" width="40" height="30" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="0" y2="16" stroke="white" stroke-width="1"/>
    <line x1="-15" y1="-8" x2="-5" y2="-8" stroke="white" stroke-width="1.5"/>
    <line x1="-15" y1="-3" x2="-5" y2="-3" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="-8" x2="15" y2="-8" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="-3" x2="15" y2="-3" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
