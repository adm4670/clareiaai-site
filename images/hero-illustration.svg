<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#da007e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba"/>
      <stop offset="100%" stop-color="#004f90"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#da007e"/>
      <stop offset="100%" stop-color="#a80062"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe4e19"/>
      <stop offset="100%" stop-color="#d43a0f"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0083ba" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle elements -->
  <circle cx="400" cy="300" r="250" fill="url(#grad1)"/>
  <circle cx="400" cy="300" r="180" stroke="#0083ba" stroke-width="1" stroke-dasharray="8,8" fill="none" opacity="0.2"/>
  <circle cx="400" cy="300" r="130" stroke="#da007e" stroke-width="1" stroke-dasharray="5,5" fill="none" opacity="0.15"/>

  <!-- AI Brain / Neural network concept -->
  <circle cx="400" cy="270" r="70" fill="white" filter="url(#shadow1)" stroke="#0083ba" stroke-width="2"/>
  
  <!-- Neural nodes and connections -->
  <g stroke="#0083ba" stroke-width="1.5" opacity="0.3">
    <line x1="350" y1="240" x2="400" y2="270"/>
    <line x1="450" y1="240" x2="400" y2="270"/>
    <line x1="350" y1="300" x2="400" y2="270"/>
    <line x1="450" y1="300" x2="400" y2="270"/>
    <line x1="370" y1="220" x2="430" y2="220"/>
    <line x1="370" y1="320" x2="430" y2="320"/>
    <line x1="340" y1="260" x2="460" y2="260"/>
    <line x1="340" y1="280" x2="460" y2="280"/>
    <line x1="360" y1="230" x2="400" y2="310"/>
    <line x1="440" y1="230" x2="400" y2="310"/>
  </g>

  <!-- Neural nodes -->
  <circle cx="350" cy="240" r="5" fill="#0083ba" opacity="0.6"/>
  <circle cx="450" cy="240" r="5" fill="#da007e" opacity="0.6"/>
  <circle cx="350" cy="300" r="5" fill="#fe4e19" opacity="0.6"/>
  <circle cx="450" cy="300" r="5" fill="#0083ba" opacity="0.6"/>
  <circle cx="370" cy="220" r="4" fill="#da007e" opacity="0.5"/>
  <circle cx="430" cy="220" r="4" fill="#0083ba" opacity="0.5"/>
  <circle cx="370" cy="320" r="4" fill="#fe4e19" opacity="0.5"/>
  <circle cx="430" cy="320" r="4" fill="#da007e" opacity="0.5"/>
  <circle cx="340" cy="260" r="4" fill="#0083ba" opacity="0.5"/>
  <circle cx="460" cy="260" r="4" fill="#fe4e19" opacity="0.5"/>
  <circle cx="340" cy="280" r="4" fill="#da007e" opacity="0.5"/>
  <circle cx="460" cy="280" r="4" fill="#0083ba" opacity="0.5"/>

  <!-- Brain center glow -->
  <circle cx="400" cy="270" r="25" fill="#0083ba" opacity="0.08"/>
  <circle cx="400" cy="270" r="15" fill="#0083ba" opacity="0.12"/>

  <!-- Lightbulb / idea icon inside circle -->
  <path d="M400 245C388 245 378 255 378 267C378 277 384 285 392 289V295C392 297 394 299 396 299H404C406 299 408 297 408 295V289C416 285 422 277 422 267C422 255 412 245 400 245Z" fill="#0083ba" opacity="0.15"/>
  <path d="M392 295H408" stroke="#0083ba" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M394 291H406" stroke="#0083ba" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Book icon left -->
  <g transform="translate(280, 200)">
    <rect x="0" y="5" width="35" height="45" rx="3" fill="#0083ba" opacity="0.12"/>
    <rect x="3" y="8" width="14" height="39" rx="1" fill="#0083ba" opacity="0.2"/>
    <rect x="18" y="8" width="14" height="39" rx="1" fill="#da007e" opacity="0.15"/>
    <line x1="3" y1="15" x2="17" y2="15" stroke="#0083ba" stroke-width="0.8" opacity="0.3"/>
    <line x1="3" y1="20" x2="17" y2="20" stroke="#0083ba" stroke-width="0.8" opacity="0.3"/>
    <line x1="18" y1="15" x2="32" y2="15" stroke="#da007e" stroke-width="0.8" opacity="0.3"/>
    <line x1="18" y1="20" x2="32" y2="20" stroke="#da007e" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Chart/Graph right -->
  <g transform="translate(485, 310)">
    <rect x="0" y="20" width="12" height="25" rx="2" fill="#0083ba" opacity="0.2"/>
    <rect x="16" y="10" width="12" height="35" rx="2" fill="#da007e" opacity="0.2"/>
    <rect x="32" y="0" width="12" height="45" rx="2" fill="#fe4e19" opacity="0.2"/>
  </g>

  <!-- Floating particles -->
  <circle cx="250" cy="180" r="3" fill="#0083ba" opacity="0.15">
    <animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="350" r="4" fill="#da007e" opacity="0.12">
    <animate attributeName="cy" values="350;338;350" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="400" r="3" fill="#fe4e19" opacity="0.1">
    <animate attributeName="cy" values="400;390;400" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="180" r="2" fill="#0083ba" opacity="0.12">
    <animate attributeName="cy" values="180;172;180" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom accent line -->
  <path d="M300 450 Q400 470 500 450" stroke="url(#grad3)" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M320 460 Q400 475 480 460" stroke="url(#grad2)" stroke-width="1.5" fill="none" opacity="0.2"/>
</svg>