<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#d9007e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#fe4e19" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba"/>
      <stop offset="100%" stop-color="#00699b"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9007e"/>
      <stop offset="100%" stop-color="#b00068"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe4e19"/>
      <stop offset="100%" stop-color="#d43a0f"/>
    </linearGradient>
    <linearGradient id="lightbulbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0083ba"/>
      <stop offset="50%" stop-color="#d9007e"/>
      <stop offset="100%" stop-color="#fe4e19"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0083ba" flood-opacity="0.12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circles -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <circle cx="400" cy="300" r="260" stroke="#0083ba" stroke-width="1" stroke-dasharray="6,6" fill="none" opacity="0.15"/>
  <circle cx="400" cy="300" r="200" stroke="#d9007e" stroke-width="1" stroke-dasharray="4,8" fill="none" opacity="0.1"/>
  <circle cx="400" cy="300" r="140" fill="#0083ba" opacity="0.03"/>

  <!-- ===== LIGHTBULB WITH GRADUATION CAP (center) ===== -->
  <g filter="url(#shadow)">
    <!-- Lightbulb body -->
    <path d="M370 240C355 255 345 275 345 295C345 315 355 328 365 335V345C365 350 370 355 375 355H425C430 355 435 350 435 345V335C445 328 455 315 455 295C455 275 445 255 430 240C420 230 410 225 400 225C390 225 380 230 370 240Z"
          fill="white" stroke="#0083ba" stroke-width="2.5"/>
    <!-- Inner glow -->
    <ellipse cx="400" cy="285" rx="28" ry="30" fill="url(#lightbulbGrad)" opacity="0.08"/>
    <circle cx="400" cy="285" r="14" fill="url(#lightbulbGrad)" opacity="0.12"/>
    <!-- Filament -->
    <path d="M390 275Q395 265 400 275Q405 285 410 275" stroke="#fe4e19" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
    <!-- Bulb base lines -->
    <line x1="380" y1="345" x2="380" y2="350" stroke="#232e3d" stroke-width="1.5" opacity="0.3"/>
    <line x1="390" y1="345" x2="390" y2="350" stroke="#232e3d" stroke-width="1.5" opacity="0.3"/>
    <line x1="400" y1="345" x2="400" y2="355" stroke="#232e3d" stroke-width="1.5" opacity="0.3"/>
    <line x1="410" y1="345" x2="410" y2="350" stroke="#232e3d" stroke-width="1.5" opacity="0.3"/>
    <line x1="420" y1="345" x2="420" y2="350" stroke="#232e3d" stroke-width="1.5" opacity="0.3"/>

    <!-- Graduation Cap on top -->
    <path d="M375 225L400 210L425 225L400 240Z" fill="url(#blueGrad)" opacity="0.9"/>
    <path d="M400 210L400 195" stroke="#232e3d" stroke-width="2" stroke-linecap="round"/>
    <rect x="396" y="193" width="8" height="3" rx="1" fill="#fe4e19"/>
    <!-- Cap tassel -->
    <path d="M425 225Q435 228 438 235" stroke="#d9007e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="438" cy="237" r="2" fill="#d9007e"/>
  </g>

  <!-- ===== GLOW RINGS AROUND BULB ===== -->
  <circle cx="400" cy="285" r="50" stroke="#0083ba" stroke-width="1" fill="none" opacity="0.1">
    <animate attributeName="r" values="50;65;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="285" r="40" stroke="#d9007e" stroke-width="1" fill="none" opacity="0.08">
    <animate attributeName="r" values="40;55;40" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0;0.08" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== AI SPARKLES ===== -->
  <g opacity="0.6">
    <polygon points="340,210 342,218 350,220 342,222 340,230 338,222 330,220 338,218" fill="#0083ba">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="460,210 462,216 468,218 462,220 460,226 458,220 452,218 458,216" fill="#d9007e">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="470,270 471,273 474,274 471,275 470,278 469,275 466,274 469,273" fill="#fe4e19">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="330,270 332,274 336,275 332,276 330,280 328,276 324,275 328,274" fill="#0083ba">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ===== BOOK (left side) ===== -->
  <g transform="translate(250, 195)" filter="url(#shadow)">
    <rect x="0" y="10" width="65" height="80" rx="4" fill="white" stroke="#0083ba" stroke-width="2"/>
    <rect x="8" y="14" width="22" height="72" rx="2" fill="#0083ba" opacity="0.08"/>
    <rect x="35" y="14" width="22" height="72" rx="2" fill="#d9007e" opacity="0.06"/>
    <!-- Book lines -->
    <line x1="12" y1="25" x2="26" y2="25" stroke="#0083ba" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="33" x2="26" y2="33" stroke="#0083ba" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="41" x2="26" y2="41" stroke="#0083ba" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="49" x2="26" y2="49" stroke="#0083ba" stroke-width="1" opacity="0.3"/>
    <line x1="39" y1="25" x2="53" y2="25" stroke="#d9007e" stroke-width="1" opacity="0.25"/>
    <line x1="39" y1="33" x2="53" y2="33" stroke="#d9007e" stroke-width="1" opacity="0.25"/>
    <line x1="39" y1="41" x2="53" y2="41" stroke="#d9007e" stroke-width="1" opacity="0.25"/>
    <!-- Bookmark -->
    <path d="M55 14L59 14L59 28L57 24L55 28Z" fill="#fe4e19" opacity="0.6"/>
  </g>

  <!-- ===== GRAPH / CHART (right side) ===== -->
  <g transform="translate(490, 310)" filter="url(#shadow)">
    <!-- Bars -->
    <rect x="5" y="30" width="20" height="40" rx="3" fill="#0083ba" opacity="0.15"/>
    <rect x="30" y="15" width="20" height="55" rx="3" fill="#d9007e" opacity="0.15"/>
    <rect x="55" y="5" width="20" height="65" rx="3" fill="#fe4e19" opacity="0.15"/>
    <rect x="80" y="20" width="20" height="50" rx="3" fill="#0083ba" opacity="0.12"/>
    <!-- Trending arrow -->
    <path d="M10 35L40 20L65 25L90 10" stroke="#fe4e19" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polygon points="90,10 83,9 85,16" fill="#fe4e19"/>
    <!-- Dots on line -->
    <circle cx="10" cy="35" r="3" fill="#0083ba" opacity="0.5"/>
    <circle cx="40" cy="20" r="3" fill="#d9007e" opacity="0.5"/>
    <circle cx="65" cy="25" r="3" fill="#fe4e19" opacity="0.5"/>
    <circle cx="90" cy="10" r="3" fill="#0083ba" opacity="0.5"/>
  </g>

  <!-- ===== NEURAL / CONNECTION LINES ===== -->
  <g stroke="#0083ba" stroke-width="1.2" opacity="0.15">
    <!-- Left connections -->
    <path d="M315 240Q350 220 370 240" fill="none"/>
    <path d="M315 260Q350 270 345 295" fill="none"/>
    <path d="M315 250Q340 245 345 270" fill="none"/>
    <!-- Right connections -->
    <path d="M455 240Q480 230 490 310" fill="none"/>
    <path d="M455 295Q480 300 490 320" fill="none"/>
    <path d="M455 260Q480 250 490 290" fill="none"/>
    <!-- Bottom connections -->
    <path d="M345 335Q400 380 455 335" fill="none"/>
  </g>

  <!-- ===== FLOATING PARTICLES ===== -->
  <circle cx="280" cy="170" r="3" fill="#0083ba" opacity="0.2">
    <animate attributeName="cy" values="170;160;170" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="340" r="2.5" fill="#d9007e" opacity="0.15">
    <animate attributeName="cy" values="340;330;340" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="420" r="2" fill="#fe4e19" opacity="0.12">
    <animate attributeName="cy" values="420;413;420" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="210" r="2.5" fill="#0083ba" opacity="0.15">
    <animate attributeName="cy" values="210;202;210" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="380" r="1.5" fill="#d9007e" opacity="0.1">
    <animate attributeName="cy" values="380;374;380" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="370" r="2" fill="#0083ba" opacity="0.12">
    <animate attributeName="cy" values="370;363;370" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== BOTTOM ACCENT DECORATION ===== -->
  <path d="M280 450 Q400 475 520 450" stroke="url(#blueGrad)" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M300 465 Q400 485 500 465" stroke="url(#pinkGrad)" stroke-width="1.5" fill="none" opacity="0.12"/>
  <path d="M330 478 Q400 492 470 478" stroke="url(#orangeGrad)" stroke-width="1" fill="none" opacity="0.08"/>

  <!-- ===== AI / TECH CIRCLES DECORATIVE ===== -->
  <circle cx="160" cy="450" r="30" stroke="#0083ba" stroke-width="1" fill="none" opacity="0.06"/>
  <circle cx="160" cy="450" r="20" stroke="#d9007e" stroke-width="0.8" fill="none" opacity="0.05"/>
  <circle cx="640" cy="130" r="25" stroke="#fe4e19" stroke-width="1" fill="none" opacity="0.05"/>
  <circle cx="640" cy="130" r="15" stroke="#0083ba" stroke-width="0.8" fill="none" opacity="0.04"/>
</svg>