<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="se1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#f0faf5"/>
    </linearGradient>
  </defs>
  <rect width="200" height="180" rx="16" fill="url(#se1)"/>
  <polygon points="0,0 80,0 0,80" fill="rgba(0,181,216,0.04)"/>
  <polygon points="200,180 120,180 200,100" fill="rgba(0,72,145,0.04)"/>
  <!-- Growth chart as origami -->
  <polygon points="35,105 50,105 50,125 35,125" fill="rgba(0,72,145,0.1)" stroke="#004891" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="35,105 50,90 50,105" fill="rgba(0,72,145,0.06)" stroke="#004891" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="65,105 80,105 80,125 65,125" fill="rgba(239,0,112,0.1)" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="65,105 80,75 80,105" fill="rgba(239,0,112,0.06)" stroke="#ef0070" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="95,105 110,105 110,125 95,125" fill="rgba(0,181,216,0.1)" stroke="#00b5d8" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="95,105 110,65 110,105" fill="rgba(0,181,216,0.06)" stroke="#00b5d8" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="125,105 140,105 140,125 125,125" fill="rgba(239,0,112,0.1)" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="125,105 140,45 140,105" fill="rgba(239,0,112,0.06)" stroke="#ef0070" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="155,105 170,105 170,125 155,125" fill="rgba(0,72,145,0.1)" stroke="#004891" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="155,105 170,55 170,105" fill="rgba(0,72,145,0.06)" stroke="#004891" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Growth line -->
  <polyline points="42,95 72,80 102,70 132,50 162,58" fill="none" stroke="#ef0070" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Star -->
  <polygon points="162,58 165,50 168,58 175,58 170,63 172,71 165,67 158,71 160,63 155,58" fill="#ef0070" opacity="0.5"/>
  <!-- Trophy base -->
  <g transform="translate(50, 140)" opacity="0.25">
    <path d="M-6,-4 Q-8,2 0,2 Q8,2 6,-4" fill="none" stroke="#004891" stroke-width="1.2"/>
    <rect x="-4" y="2" width="8" height="6" rx="1" fill="none" stroke="#004891" stroke-width="1"/>
  </g>
  <text x="100" y="135" text-anchor="middle" fill="#004891" font-size="13" font-family="sans-serif" font-weight="bold">Evolução</text>
  <text x="100" y="152" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">Acompanhamento contínuo</text>
</svg>
