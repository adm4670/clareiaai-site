<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="mg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef0070;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00b5d8;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="200" height="180" rx="16" fill="url(#mg3)"/>
  <!-- Upward arrow/growth chart -->
  <rect x="30" y="100" width="20" height="40" rx="2" fill="#004891" opacity="0.3"/>
  <rect x="60" y="75" width="20" height="65" rx="2" fill="#ef0070" opacity="0.4"/>
  <rect x="90" y="55" width="20" height="85" rx="2" fill="#00b5d8" opacity="0.4"/>
  <rect x="120" y="35" width="20" height="105" rx="2" fill="#ef0070" opacity="0.5"/>
  <rect x="150" y="25" width="20" height="115" rx="2" fill="#004891" opacity="0.4"/>
  <!-- Growth line -->
  <polyline points="40,100 70,75 100,55 130,35 160,25" fill="none" stroke="#ef0070" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Star -->
  <polygon points="160,25 163,33 172,33 165,38 168,46 160,41 152,46 155,38 148,33 157,33" fill="#ef0070"/>
  <!-- Trophy -->
  <g transform="translate(60, 135)">
    <path d="M-8,-5 Q-8,-12 0,-12 Q8,-12 8,-5" fill="none" stroke="#004891" stroke-width="1.5"/>
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="none" stroke="#004891" stroke-width="1.5"/>
    <rect x="-3" y="4" width="6" height="4" fill="#004891" opacity="0.5"/>
  </g>
  <text x="100" y="135" text-anchor="middle" fill="#004891" font-size="13" font-family="sans-serif" font-weight="bold">Evolução</text>
  <text x="100" y="152" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">Acompanhamento contínuo</text>
</svg>
