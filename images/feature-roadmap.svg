<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004891;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#004891;stop-opacity:0.03"/>
    </linearGradient>
  </defs>
  <!-- Origami mountain path -->
  <polyline points="15,85 35,45 55,60 75,30 95,50 105,35" fill="none" stroke="#004891" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fold planes -->
  <polygon points="15,85 25,65 35,45" fill="#ef0070" opacity="0.1" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="35,45 45,52 55,60" fill="#00b5d8" opacity="0.1" stroke="#00b5d8" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="55,60 65,45 75,30" fill="#ef0070" opacity="0.12" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="75,30 85,40 95,50" fill="#004891" opacity="0.1" stroke="#004891" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="95,50 100,42 105,35" fill="#00b5d8" opacity="0.1" stroke="#00b5d8" stroke-width="1" stroke-linejoin="round"/>
  <!-- Flag as origami -->
  <polygon points="105,35 115,30 115,40" fill="#ef0070" opacity="0.3" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <!-- Nodes -->
  <circle cx="35" cy="45" r="4" fill="#ef0070"/>
  <circle cx="55" cy="60" r="4" fill="#00b5d8"/>
  <circle cx="75" cy="30" r="4" fill="#ef0070"/>
  <circle cx="95" cy="50" r="4" fill="#004891"/>
  <text x="60" y="118" text-anchor="middle" fill="#004891" font-size="11" font-family="sans-serif" font-weight="bold">Roadmap</text>
</svg>
