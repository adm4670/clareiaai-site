<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="simuladoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9007e"/>
      <stop offset="100%" stop-color="#b00068"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe4e19"/>
      <stop offset="100%" stop-color="#d43a0f"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#d9007e" opacity="0.06"/>
  <circle cx="50" cy="50" r="35" fill="#d9007e" opacity="0.03"/>

  <!-- Clipboard / checklist base -->
  <rect x="30" y="22" width="40" height="56" rx="6" fill="white" stroke="#d9007e" stroke-width="2"/>
  <rect x="40" y="17" width="20" height="10" rx="3" fill="#d9007e" opacity="0.15"/>

  <!-- Checklist lines -->
  <line x1="38" y1="40" x2="62" y2="40" stroke="#d9007e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="38" y1="50" x2="62" y2="50" stroke="#d9007e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="38" y1="60" x2="55" y2="60" stroke="#d9007e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M35 65L40 70L48 60" stroke="#d9007e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Graduation cap on top of clipboard -->
  <path d="M40 20L50 12L60 20L50 28Z" fill="url(#simuladoGrad)" opacity="0.85"/>
  <path d="M50 12L50 8" stroke="#232e3d" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="50" cy="7" r="2" fill="#fe4e19" opacity="0.6"/>

  <!-- Sparkle stars -->
  <polygon points="72,28 73,31 76,32 73,33 72,36 71,33 68,32 71,31" fill="url(#starGrad)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="28,70 29,72 31,73 29,74 28,76 27,74 25,73 27,72" fill="url(#starGrad)" opacity="0.5">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="68,68 69,69 70,70 69,71 68,72 67,71 66,70 67,69" fill="#d9007e" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.8s" repeatCount="indefinite"/>
  </polygon>
</svg>