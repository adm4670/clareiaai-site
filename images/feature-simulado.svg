  <polygon points="45,45 60,38 75,45 60,52" fill="#ef0070" opacity="0.12" stroke="#ef0070" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="60" y="49" text-anchor="middle" fill="#ef0070" font-size="9" font-weight="bold" font-family="sans-serif">ENEM</text>
  <polygon points="35,65 50,60 65,65 50,70" fill="#004891" opacity="0.08" stroke="#004891" stroke-width="0.8" stroke-linejoin="round"/>
  <polygon points="40,78 55,73 70,78 55,83" fill="#00b5d8" opacity="0.08" stroke="#00b5d8" stroke-width="0.8" stroke-linejoin="round"/>
  <text x="60" y="118" text-anchor="middle" fill="#004891" font-size="11" font-family="sans-serif" font-weight="bold">Simulados</text>
</svg>
