<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef0070;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#004891;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <!-- Origami paper -->
  <polygon points="30,20 90,20 100,30 100,100 30,100 20,90 20,30" fill="url(#s1)" stroke="#004891" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="90,20 100,30 90,30" fill="#004891" opacity="0.15" stroke="#004891" stroke-width="1" stroke-linejoin="round"/>
  <!-- Fold line -->
  <line x1="60" y1="20" x2="60" y2="100" stroke="#004891" stroke-width="0.5" opacity="0.3"/>
