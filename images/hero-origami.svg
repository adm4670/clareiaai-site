<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#faf0f5"/>
    </linearGradient>
    <linearGradient id="ogPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef0070;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ef0070;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="ogBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004891;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#004891;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="ogCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b5d8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00b5d8;stop-opacity:0.03"/>
    </linearGradient>
  </defs>

  <rect width="600" height="500" rx="20" fill="url(#ogBg)"/>

  <!-- Background origami triangles -->
  <polygon points="0,0 150,0 0,150" fill="url(#ogPink)"/>
  <polygon points="600,500 450,500 600,350" fill="url(#ogBlue)"/>
  <polygon points="0,500 120,350 0,380" fill="url(#ogCyan)"/>
  <polygon points="600,0 480,0 600,120" fill="url(#ogPink)"/>

  <!-- Geometric grid pattern -->
  <g opacity="0.04" stroke="#004891" stroke-width="0.8" fill="none">
    <polygon points="300,50 350,100 300,150 250,100"/>
    <polygon points="350,100 420,120 380,180 300,150"/>
    <polygon points="300,150 380,180 340,250 250,200"/>
    <polygon points="250,100 300,150 250,200 180,180"/>
    <polygon points="420,120 500,100 480,180 380,180"/>
    <polygon points="500,100 550,160 480,180"/>
    <polygon points="180,180 250,200 200,270 120,250"/>
    <polygon points="340,250 380,180 450,250 400,310"/>
    <polygon points="200,270 250,200 310,280 260,330"/>
    <polygon points="200,270 260,330 180,360 120,250"/>
    <polygon points="310,280 450,250 400,310 340,340"/>
    <polygon points="260,330 310,280 340,340 290,380"/>
    <polygon points="400,310 450,250 520,300 460,360"/>
    <polygon points="180,360 260,330 290,380 220,420"/>
    <polygon points="340,340 400,310 460,360 390,410"/>
    <polygon points="220,420 290,380 340,340 390,410 340,460 260,460"/>
    <polygon points="460,360 520,300 570,380 500,440"/>
    <polygon points="390,410 460,360 500,440 430,480"/>
  </g>

  <!-- Central origami crane -->
  <g transform="translate(300, 240)" fill="none" stroke-linejoin="round" stroke-linecap="round">

    <!-- Crane body - left wing -->
    <polygon points="0,5 -50,-20 -20,-45" fill="rgba(239,0,112,0.15)" stroke="#ef0070" stroke-width="1.5"/>
    <polygon points="0,5 -50,-20 -40,15" fill="rgba(239,0,112,0.08)" stroke="#ef0070" stroke-width="0.8" opacity="0.5"/>

    <!-- Crane body - right wing -->
    <polygon points="0,5 50,-20 20,-45" fill="rgba(0,181,216,0.15)" stroke="#00b5d8" stroke-width="1.5"/>
    <polygon points="0,5 50,-20 40,15" fill="rgba(0,181,216,0.08)" stroke="#00b5d8" stroke-width="0.8" opacity="0.5"/>

    <!-- Crane body - center -->
    <polygon points="0,5 -15,30 0,50 15,30" fill="rgba(0,72,145,0.12)" stroke="#004891" stroke-width="1.2"/>
    <polygon points="-15,30 0,5 15,30" fill="rgba(0,72,145,0.06)" stroke="#004891" stroke-width="0.8"/>

    <!-- Crane head -->
    <polygon points="-20,-45 -35,-55 -25,-60 -15,-50" fill="rgba(239,0,112,0.12)" stroke="#ef0070" stroke-width="1.2"/>
    <polygon points="20,-45 35,-55 25,-60 15,-50" fill="rgba(0,181,216,0.12)" stroke="#00b5d8" stroke-width="1.2"/>

    <!-- Crane tail -->
    <polygon points="-40,15 -55,35 -45,45 -30,25" fill="rgba(239,0,112,0.08)" stroke="#ef0070" stroke-width="0.8"/>
    <polygon points="40,15 55,35 45,45 30,25" fill="rgba(0,181,216,0.08)" stroke="#00b5d8" stroke-width="0.8"/>

    <!-- Fold lines -->
    <line x1="0" y1="5" x2="-20" y2="-45" stroke="#ef0070" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="5" x2="20" y2="-45" stroke="#00b5d8" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="5" x2="0" y2="50" stroke="#004891" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Floating small origami pieces -->
  <g opacity="0.3">
    <polygon points="80,100 95,85 110,100 95,115" fill="#ef0070" opacity="0.2"/>
    <polygon points="500,380 515,365 530,380 515,395" fill="#00b5d8" opacity="0.2"/>
    <polygon points="130,420 145,405 160,420 145,435" fill="#004891" opacity="0.15"/>
    <polygon points="470,130 485,115 500,130 485,145" fill="#ef0070" opacity="0.15"/>
  </g>

  <!-- Small decorative dots -->
  <g fill="#004891" opacity="0.06">
    <circle cx="200" cy="80" r="3"/>
    <circle cx="400" cy="60" r="2"/>
    <circle cx="150" cy="180" r="2.5"/>
    <circle cx="450" cy="200" r="2"/>
    <circle cx="100" cy="300" r="3"/>
    <circle cx="500" cy="310" r="2.5"/>
    <circle cx="350" cy="440" r="2"/>
    <circle cx="250" cy="460" r="3"/>
  </g>

  <!-- Book/knowledge icon at bottom -->
  <g transform="translate(300, 420)" opacity="0.35">
    <polygon points="-25,-8 0,-18 25,-8 0,2" fill="#ef0070" opacity="0.3" stroke="#ef0070" stroke-width="1"/>
    <polygon points="-25,-8 -20,10 0,15 0,2" fill="#004891" opacity="0.2" stroke="#004891" stroke-width="0.8"/>
    <polygon points="25,-8 20,10 0,15 0,2" fill="#00b5d8" opacity="0.2" stroke="#00b5d8" stroke-width="0.8"/>
    <line x1="0" y1="-18" x2="0" y2="15" stroke="#004891" stroke-width="0.8" opacity="0.3"/>
  </g>
</svg>
