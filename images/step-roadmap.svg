  <!-- Brain icon -->
  <g transform="translate(100, 130)">
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="none" stroke="#004891" stroke-width="1.5" opacity="0.4"/>
    <path d="M-8,-10 Q-14,-4 -12,2 Q-10,8 -6,10" fill="none" stroke="#ef0070" stroke-width="1.5" opacity="0.5"/>
    <path d="M8,-10 Q14,-4 12,2 Q10,8 6,10" fill="none" stroke="#00b5d8" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="100" y="135" text-anchor="middle" fill="#004891" font-size="13" font-family="sans-serif" font-weight="bold">Roadmap</text>
  <text x="100" y="152" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">Plano personalizado</text>
