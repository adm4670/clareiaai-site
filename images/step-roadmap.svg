<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="mg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b5d8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#004891;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect width="200" height="180" rx="16" fill="url(#mg2)"/>
  <!-- Path with nodes -->
  <polyline points="25,110 60,60 100,80 140,40 175,90" fill="none" stroke="#004891" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="25,110 60,60 100,80 140,40 175,90" fill="none" stroke="#ef0070" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,8" opacity="0.8"/>
  <circle cx="25" cy="110" r="6" fill="#004891"/>
  <circle cx="60" cy="60" r="6" fill="#ef0070"/>
  <circle cx="100" cy="80" r="6" fill="#00b5d8"/>
  <circle cx="140" cy="40" r="6" fill="#ef0070"/>
  <circle cx="175" cy="90" r="6" fill="#004891"/>
  <!-- Flag at end -->
