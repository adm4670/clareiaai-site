<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="sr1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#f5f0fa"/>
    </linearGradient>
  </defs>
  <rect width="200" height="180" rx="16" fill="url(#sr1)"/>
  <polygon points="200,0 120,0 200,80" fill="rgba(0,72,145,0.04)"/>
  <polygon points="0,180 80,180 0,100" fill="rgba(239,0,112,0.04)"/>
  <!-- Origami path -->
  <polygon points="25,110 50,65 55,70" fill="rgba(239,0,112,0.08)" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="55,70 80,50 85,55" fill="rgba(0,181,216,0.08)" stroke="#00b5d8" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="85,55 120,40 125,45" fill="rgba(0,72,145,0.08)" stroke="#004891" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="125,45 155,60 160,65" fill="rgba(239,0,112,0.08)" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="160,65 175,90 178,85" fill="rgba(00,181,216,0.08)" stroke="#00b5d8" stroke-width="1" stroke-linejoin="round"/>
  <!-- Path line -->
  <polyline points="25,110 55,70 85,55 125,45 160,65 178,85" fill="none" stroke="#004891" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Flag -->
  <polygon points="178,85 190,80 190,90" fill="#ef0070" opacity="0.4" stroke="#ef0070" stroke-width="1" stroke-linejoin="round"/>
  <!-- Brain icon -->
  <g transform="translate(100, 130)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="none" stroke="#004891" stroke-width="1.2"/>
    <path d="M-8,-8 Q-12,-3 -10,2 Q-8,6 -5,8" fill="none" stroke="#ef0070" stroke-width="1.2"/>
    <path d="M8,-8 Q12,-3 10,2 Q8,6 5,8" fill="none" stroke="#00b5d8" stroke-width="1.2"/>
  </g>
  <text x="100" y="135" text-anchor="middle" fill="#004891" font-size="13" font-family="sans-serif" font-weight="bold">Roadmap</text>
  <text x="100" y="152" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif">Plano personalizado</text>
</svg>
